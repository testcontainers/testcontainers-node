name: "Podman Setup"
description: "Sets up Podman"
runs:
  using: "composite"
  steps:
    - name: Install Podman
      uses: redhat-actions/podman-install@5bc2ecc87c737059124c295845be51ee7297fb89
      with:
        ubuntu-repository: questing

    - name: Configure Podman
      shell: bash
      run: |
        PODMAN_VERSION="$(podman --version | awk '{print $3}')"
        if [[ "${PODMAN_VERSION}" != 5.* ]]; then
          echo "Expected Podman 5.x, got ${PODMAN_VERSION}"
          exit 1
        fi

        PODMAN_SOCKET="${RUNNER_TEMP:-/tmp}/podman.sock"

        sudo mkdir -p /etc/systemd/system/podman.socket.d
        sudo systemctl stop podman.service podman.socket || true
        sudo rm -f "${PODMAN_SOCKET}"
        printf '[Socket]\nListenStream=\nListenStream=%s\nSocketUser=%s\nSocketMode=0600\nRemoveOnStop=yes\n' "${PODMAN_SOCKET}" "$(id -un)" | sudo tee /etc/systemd/system/podman.socket.d/runner.conf
        sudo systemctl daemon-reload
        sudo systemctl enable --now podman.socket
        ls -l "${PODMAN_SOCKET}"
        podman --url="unix://${PODMAN_SOCKET}" info
        echo "DOCKER_HOST=unix://${PODMAN_SOCKET}" >> $GITHUB_ENV
        echo "CI_PODMAN=true" >> $GITHUB_ENV
