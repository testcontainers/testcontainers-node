version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "javascript"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # archiver v8 is ESM-only; keep CommonJS-compatible major versions.
      - dependency-name: "archiver"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/archiver"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "docker"
    directories:
      - "/packages/modules/*"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "devcontainers"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker_compose"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "pip"
    groups:
      dependencies:
        patterns:
          - "*"
